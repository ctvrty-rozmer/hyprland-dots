# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
    name = no-gaps-wtv1
    match:float = false
    match:workspace = w[tv1]

    border_size = 0
    rounding = 0
}

windowrule {
    name = no-gaps-f1
    match:float = false
    match:workspace = f[1]

    border_size = 0
    rounding = 0
}

# Ignore maximize requests from all apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}


# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
#transparent firefox
windowrule {
    name = transparent-fox
    match:class = firefox
    opacity = 0.9
}

#transparent discord
windowrule {
    name = transparent-discord
    match:class = discord
    opacity = 0.9
}

# wofi layer rules
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha .5, match:namespace wofi
layerrule = xray on, match:namespace wofi
layerrule = blur_popups = on match:namespace wofi
layerrule = dim_around = on match:namespace wofi

# waybar layer rules
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha .3, match:namespace waybar
layerrule = xray on, match:namespace waybar
layerrule = blur_popups on, match:namespace waybar
# swaync layer rules
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
layerrule = xray on, match:namespace swaync-control-center
layerrule = xray on, match:namespace swaync-notification-window
