exec-once = waybar & hyprpaper
exec-once = wal --theme eink1.0
exec-once =  discord --enable-features=WaylandWindowDecorations --ozone-platform-hint=auto
# exec-once = swaync
exec-once = hyprland-autoname-workspaces
exec-once = pidof -x battery_notify.sh || ~/scripts/Battery_Notify/battery_notify.sh &
exec-once = pidof -x battery_warning.sh || ~/scripts/Battery_Notify/battery_warning.sh &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
